        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

<body>
  <nav class="navbar navbar-expand-lg custom-brown-nav">

      <a class="navbar-brand" href="#">海南八音文化</a>

      </button>

        <ul class="navbar-nav">
          <li class="nav-item">

  <button class="back-btn" onclick="window.history.back()">返回上一页</button>

  <div class="instrument-info-card">
    <img src="../img/syq yehu.png" alt="椰胡介绍卡片">
  </div>

  <div class="instrument-main-show">
    <h2 class="instrument-main-title">椰胡</h2>
    <img src="../img/syq center.png" class="instrument-main-img" alt="椰胡">
    <div id="model-container" class="instrument-main-model-wrapper">
    </div>
    <img src="../img/syq anniu.png" class="rotate-tip-img" alt="拖动旋转视角">
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, model;

    function init() {
      const container = document.getElementById('model-container');
      if (!container) return;

      scene = new THREE.Scene();
      scene.background = null;

      const containerWidth = container.clientWidth || 500;
      const containerHeight = container.clientHeight || 500;
      camera = new THREE.PerspectiveCamera(45, containerWidth / containerHeight, 0.1, 1000);
      camera.position.set(0, 0, 8);

      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setSize(containerWidth, containerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 1;
      controls.maxDistance = 30;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.7);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      const loader = new GLTFLoader();
      const modelPath = '../3d/yehu/yehu.glb';

      loader.load(
        modelPath,
        function (gltf) {
          model = gltf.scene;

          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          model.position.sub(center);

          const scale = 4.5;
          model.scale.set(scale, scale, scale);

          scene.add(model);
          controls.update();
        },
        (xhr) => { },
        (err) => {
          console.error('模型加载失败', err);
        }
      );

      function animate() {
        requestAnimationFrame(animate);
        controls.update();

        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / containerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, containerHeight);
      });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
