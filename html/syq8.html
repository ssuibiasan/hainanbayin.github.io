<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="../css/bootstrap.min.css" rel="stylesheet" />
  <link href="../css/main.css" rel="stylesheet" />
  <link href="../css/syq enter.css" rel="stylesheet" />
  <title>Document</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <style>
    #model-container {
      background: transparent;
      border: none;
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 1300px;
      z-index: 20;
    }
  </style>
</head>

<body>
  <nav class="navbar navbar-expand-lg custom-brown-nav">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">海南八音文化</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">首页</a>
          </li>
          <li class="nav-item">
            <a class="nav-link " href="tls.html">探历史</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="syq.html">赏乐器</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="tyl.html">听音律</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="qby.html">趣八音</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <button class="back-btn" onclick="window.history.back()">返回上一页</button>

  <div class="instrument-info-card">
    <img src="../img/syq gu.png" alt="鼓介绍卡片">
  </div>

  <div class="instrument-main-show">
    <h2 class="instrument-main-title">鼓</h2>
    <img src="../img/syq center.png" class="instrument-main-img" alt="鼓">
    <div id="model-container" class="instrument-main-model-wrapper">
    </div>
    <img src="../img/syq anniu.png" class="rotate-tip-img" alt="拖动旋转视角">
  </div>

  <script src="../js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, model;

    function init() {
      const container = document.getElementById('model-container');
      if (!container) return;

      scene = new THREE.Scene();
      scene.background = null;

      const containerWidth = container.clientWidth || 500;
      const containerHeight = container.clientHeight || 500;
      camera = new THREE.PerspectiveCamera(45, containerWidth / containerHeight, 0.1, 1000);
      camera.position.set(0, 0, 8);


      renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: true
      });
      renderer.setSize(containerWidth, containerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      container.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 1;
      controls.maxDistance = 30;


      scene.add(new THREE.AmbientLight(0xffffff, 1.5));
      const light = new THREE.DirectionalLight(0xffffff, 2.0);
      light.position.set(0, 5, 5);
      scene.add(light);
      const backLight = new THREE.DirectionalLight(0xffffff, 1.5);
      backLight.position.set(0, -5, -5);
      scene.add(backLight);

      const loader = new GLTFLoader();
      const modelPath = '../3d/gu/gu.glb';

      loader.load(
        modelPath,
        function (gltf) {
          model = gltf.scene;


          model.traverse((child) => {
            if (child.isMesh && child.material) {
              child.material.metalness = 0.2;
              child.material.roughness = 0.5;
              child.material.needsUpdate = true;
            }
          });

          const box = new THREE.Box3().setFromObject(model);
          const center = box.getCenter(new THREE.Vector3());
          model.position.sub(center);
          model.scale.set(9.5, 9.5, 9.5);
          scene.add(model);
        },
        undefined,
        (err) => console.error('模型加载失败', err)
      );

      function animate() {
        requestAnimationFrame(animate);
        controls.update();

        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / containerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, containerHeight);
      });
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>
