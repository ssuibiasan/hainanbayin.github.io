  <div class="container-fluid py-4">

      <div class="trend-chart-box mt-5">
        <h3 class="text-center mb-4" style="color: #333;">海南八音传承热度趋势</h3>
        <div id="trendChart" class="w-100" style="height: clamp(250px, 40vw, 320px);"></div>

        <p class="text-center text-muted mt-2 mb-0">基于多篇文献综述的趋势示意</p>
      </div>

    </div>
  </div>

  <!-- 时间线 -->
  <script>
    const track = document.getElementById('track');
    const leftBtn = document.getElementById('leftBtn');
    const rightBtn = document.getElementById('rightBtn');
    const nodes = document.querySelectorAll('.timeline-node');
    let currentPosition = 0;
    let nodeWidth, containerWidth, maxPosition;
    const scrollStepRatio = 0.5;

    function calculateDimensions() {
      nodeWidth = nodes.length > 0 ? nodes[0].offsetWidth : 0;
      containerWidth = track.parentElement.offsetWidth;
      maxPosition = Math.max(0, (nodes.length * nodeWidth) - containerWidth);
      currentPosition = Math.min(currentPosition, maxPosition);
      moveTrack();
    }

    function updateButtons() {
      leftBtn.disabled = currentPosition <= 0;
      rightBtn.disabled = currentPosition >= maxPosition;
    }

    function moveTrack() {
      track.style.transform = `translateX(-${currentPosition}px)`;
      updateButtons();
    }

    leftBtn.addEventListener('click', () => {
      currentPosition = Math.max(0, currentPosition - (containerWidth * scrollStepRatio));
      moveTrack();
    });

    rightBtn.addEventListener('click', () => {
      currentPosition = Math.min(maxPosition, currentPosition + (containerWidth * scrollStepRatio));
      moveTrack();
    });

    calculateDimensions();
    window.addEventListener('resize', calculateDimensions);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <script>
    var trendChart = echarts.init(document.getElementById('trendChart'));

    var option = {
      color: ['#e67e22', '#d4a76a'],
      tooltip: {
        trigger: 'axis',
        formatter: function (params) {
          let res = params[0].axisValue + '<br/>';
          params.forEach(item => {
            res += item.seriesName + '：' + (item.data > 3 ? '上升趋势' : '平稳/下降趋势') + '<br/>';
          });
          return res;
        }
      },
      legend: {
        data: ['非遗传承人传承热度', '民间八音班发展热度'],
        top: 0,
        left: 'center'
      },
      grid: {
        left: '3%',
        right: '4%',
        bottom: '3%',
        containLabel: true
      },
      xAxis: {
        type: 'category',
        boundaryGap: false,
        data: ['唐代', '宋代', '明代', '清代', '民国', '2008年', '2015年', '2020年', '2025年'],
        axisLine: {
          lineStyle: {
            color: '#999'
          }
        }
      },
      yAxis: [
        {
          type: 'value',
          name: '传承热度',
          axisLabel: {
            show: false
          },
          splitLine: {
            show: false
          },
          axisLine: {
            show: false
          }
        },
        {
          type: 'value',
          name: '发展热度',
          axisLabel: {
            show: false
          },
          splitLine: {
            show: false
          },
          axisLine: {
            show: false
          }
        }
      ],
      series: [
        {
          name: '非遗传承人传承热度',
          type: 'line',
          smooth: true,
          data: [0, 0, 1, 2, 3, 4, 5, 6, 7],
          symbol: 'circle',
          symbolSize: 8,
          lineStyle: {
            width: 3
          },
          areaStyle: {
            opacity: 0.1
          }
        },
        {
          name: '民间八音班发展热度',
          type: 'line',
          smooth: true,
          yAxisIndex: 1,
          data: [0, 1, 3, 5, 4, 3, 2, 1.5, 1],
          symbol: 'circle',
          symbolSize: 8,
          lineStyle: {
            width: 3
          },
          areaStyle: {
            opacity: 0.1
          }
        }
      ]
    };

    trendChart.setOption(option);

    window.addEventListener('resize', function () {
      trendChart.resize();
    });
  </script>
